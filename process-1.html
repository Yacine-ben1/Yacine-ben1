<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل أولي على المنصة وسيط2 - Inscription initiale sur la plateforme</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f0fdfa 0%, #ffffff 50%, #fff7ed 100%);
            min-height: 100vh;
            padding: 2rem;
            direction: rtl;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 2px solid;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-home {
            border-color: #0d9488;
            color: #0d9488;
            background: white;
        }
        
        .btn-home:hover {
            background: #f0fdfa;
        }
        
        .process-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #0d9488;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        h1 {
            color: #0f766e;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #4b5563;
            font-size: 1.25rem;
        }
        
        .image-container {
            background: white;
            border: 2px solid #99f6e4;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .description {
            background: #f0fdfa;
            border: 2px solid #99f6e4;
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            font-size: 1.125rem;
            color: #374151;
            margin-bottom: 2rem;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn-nav {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-prev {
            background: #0d9488;
        }
        
        .btn-prev:hover {
            background: #0f766e;
        }
        
        .btn-next {
            background: #ea580c;
        }
        
        .btn-next:hover {
            background: #c2410c;
        }
        
        .btn-nav:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-dots {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }
        
        .dot {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background: #99f6e4;
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background: #0d9488;
            width: 2rem;
            border-radius: 9999px;
        }
        
        .footer {
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #d1d5db;
        }
        
        @media print {
            body {
                background: white;
            }
            
            .top-nav, .navigation {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="btn btn-home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                القائمة الرئيسية
            </a>
            <div class="process-badge">
                <span>1</span>
                <span style="font-size: 0.875rem;">من 7</span>
            </div>
            <div style="width: 150px;"></div>
        </div>
        
        <div class="header">
            <h1>تسجيل أولي على المنصة وسيط2</h1>
            <p class="subtitle">Inscription initiale sur la plateforme</p>
        </div>
        
        <div class="image-container">
            <img src="https://github.com/Yacine-ben1/Yacine-ben1/raw/main/Inscription_demandeur.PNG" alt="تسجيل أولي على المنصة منحة">
        </div>
        
        <div class="description">
           2 عملية التسجيل الأولي  على منصة 
        </div>
        
        <div class="navigation">
            <div style="width: 100px;"></div>
            
            <div class="progress-dots">
                <div class="dot active"></div><div class="dot "></div><div class="dot "></div><div class="dot "></div><div class="dot "></div><div class="dot "></div><div class="dot "></div>
            </div>
            
            <a href="process-2.html" class="btn-nav btn-next">
                التالي
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>
        </div>
        
        <div class="footer">
            <p>عرض العمليات الإدارية | Présentation des Processus Administratifs</p>
            <p style="margin-top: 0.5rem;">تم إنشاؤه بواسطة نظام العرض الإلكتروني</p>
        </div>
    </div>
</body>
</html>
